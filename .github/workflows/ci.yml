name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install package
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --cov=policyengine_ads_dashboard

      - name: Lint
        run: ruff check policyengine_ads_dashboard/

      - name: Format check
        run: black --check policyengine_ads_dashboard/ tests/
